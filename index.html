<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blockli Pages Site</title>
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:40px}code{background:#f3f4f6;padding:2px 6px;border-radius:4px}</style>
</head>
<body>
  <h1>Blockli Pages Site</h1>
  <p>API token: <code id="token">loading…</code></p>
  <script>
    fetch('api/token.json')
      .then(r=>r.json())
      .then(j=>document.getElementById('token').textContent = j.token)
      .catch(()=>document.getElementById('token').textContent = 'error')
  </script>
</body>
</html>
